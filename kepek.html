<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Képek</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #111;
  color: #eee;
}

.wrap {
  max-width: 980px;
  margin: 0 auto;
  padding: 30px 20px 60px;
}

h1 { font-size: 2.1rem; }

.intro {
  color: #bbb;
  margin-bottom: 24px;
  line-height: 1.6;
}

.topbar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

button {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: #d6b36a;
  color: #111;
  font-weight: bold;
  cursor: pointer;
}

button.secondary {
  background: #2b2b2b;
  color: #eee;
  border: 1px solid #444;
}

button.next {
  background: #4caf50;
  color: white;
}

.loadingBox, .errorBox, .infoBox {
  margin-top: 18px;
  padding: 14px;
  border-radius: 12px;
}

.loadingBox { display:none; background:#151515; border:1px solid #333; }
.errorBox { display:none; background:#2a1616; border:1px solid #6a2c2c; }
.infoBox { display:none; background:#162417; border:1px solid #2f6a35; }

.layout {
  display:none;
  grid-template-columns: 320px 1fr;
  gap:18px;
  margin-top:24px;
}

.card {
  background:#1a1a1a;
  border:1px solid #333;
  border-radius:14px;
  padding:18px;
}

.miniTitle {
  color:#c9b07a;
  margin-bottom:6px;
}

.valueBox {
  background:#141414;
  border:1px solid #2c2c2c;
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
}

.mainType {
  font-size:1.3rem;
  margin-bottom:10px;
}

.previousBox {
  margin-top:20px;
  background:#151515;
  padding:15px;
  border-radius:12px;
}

.previousGrid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.footerRow {
  margin-top:20px;
  display:none;
}
</style>
</head>

<body>

<div class="wrap">
<h1>Képek</h1>

<p class="intro">
Itt azt nézzük, hogy a vers mennyire dolgozik valódi képekkel.
</p>

<div class="topbar">
  <button class="secondary" id="backBtn">← Vissza</button>
  <button id="reloadBtn">Újraelemzés</button>
</div>

<div class="loadingBox" id="loadingBox">Dolgozom...</div>
<div class="errorBox" id="errorBox"></div>
<div class="infoBox" id="infoBox"></div>

<div class="layout" id="resultLayout">

  <!-- BAL -->
  <div class="card">
    <h2>Képiség</h2>

    <div class="miniTitle">Képek jelenléte</div>
    <div class="mainType" id="imageryPresence">—</div>
    <div class="valueBox" id="imageryPresenceNote">—</div>

    <div class="miniTitle">Konkrétság</div>
    <div class="valueBox" id="concreteness">—</div>
    <div class="valueBox" id="concretenessNote">—</div>
  </div>

  <!-- JOBB -->
  <div class="card">
    <h2>Indoklás</h2>

    <div class="miniTitle">Képek szerepe</div>
    <div class="valueBox" id="imageryRole">—</div>
    <div class="valueBox" id="imageryRoleNote">—</div>

    <div class="miniTitle">Összetartás</div>
    <div class="valueBox" id="imageryCohesion">—</div>
    <div class="valueBox" id="imageryCohesionNote">—</div>

    <div class="miniTitle">Egyediség</div>
    <div class="valueBox" id="originality">—</div>
    <div class="valueBox" id="originalityNote">—</div>

    <div class="miniTitle">Indoklás</div>
    <div class="valueBox" id="reasoning">—</div>
  </div>

</div>

<div class="footerRow" id="footerRow">
  <button class="next" id="nextBtn">Tovább</button>
</div>

</div>

<script>

const WORKER_URL = "https://verskritika.trknorbert76.workers.dev";

const imageryPresenceEl = document.getElementById("imageryPresence");
const imageryPresenceNoteEl = document.getElementById("imageryPresenceNote");

const concretenessEl = document.getElementById("concreteness");
const concretenessNoteEl = document.getElementById("concretenessNote");

const imageryRoleEl = document.getElementById("imageryRole");
const imageryRoleNoteEl = document.getElementById("imageryRoleNote");

const imageryCohesionEl = document.getElementById("imageryCohesion");
const imageryCohesionNoteEl = document.getElementById("imageryCohesionNote");

const originalityEl = document.getElementById("originality");
const originalityNoteEl = document.getElementById("originalityNote");

const reasoningEl = document.getElementById("reasoning");

function renderResult(r) {
  imageryPresenceEl.textContent = r.imagery_presence;
  imageryPresenceNoteEl.textContent = r.imagery_presence_note;

  concretenessEl.textContent = r.concreteness;
  concretenessNoteEl.textContent = r.concreteness_note;

  imageryRoleEl.textContent = r.imagery_role;
  imageryRoleNoteEl.textContent = r.imagery_role_note;

  imageryCohesionEl.textContent = r.imagery_cohesion;
  imageryCohesionNoteEl.textContent = r.imagery_cohesion_note;

  originalityEl.textContent = r.originality;
  originalityNoteEl.textContent = r.originality_note;

  reasoningEl.textContent = r.reasoning;

  document.getElementById("resultLayout").style.display = "grid";
  document.getElementById("footerRow").style.display = "block";
}

async function run() {
  const poem = sessionStorage.getItem("poem");

  const res = await fetch(WORKER_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ poem, step:"images" })
  });

  const data = await res.json();

  console.log(data.result);

  renderResult(data.result);
}

run();

</script>

</body>
</html>
