<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kifejezésmód</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #111;
  color: #eee;
}

.wrap {
  max-width: 980px;
  margin: 0 auto;
  padding: 30px 20px 60px;
}

h1 {
  font-size: 2.2rem;
  margin-bottom: 10px;
}

.intro {
  color: #bbb;
  margin-bottom: 20px;
  line-height: 1.6;
}

/* NAV */
.topbar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.back {
  background: #333;
  color: #fff;
}

.reload {
  background: #d6b36a;
  color: #111;
}

/* BLOKKOK */
.box {
  background: #151515;
  border: 1px solid #303030;
  border-radius: 14px;
  padding: 18px;
  margin-top: 20px;
}

.box h2 {
  margin-top: 0;
  margin-bottom: 12px;
  color: #d6b36a;
  font-size: 1.05rem;
}

/* VERS */
.poemText {
  white-space: pre-wrap;
  line-height: 1.7;
  color: #ddd;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.item {
  background: #121212;
  border: 1px solid #2c2c2c;
  border-radius: 10px;
  padding: 12px;
}

.item strong {
  display: block;
  color: #c9b07a;
  margin-bottom: 6px;
}

/* EREDMÉNY */
.result {
  margin-top: 20px;
}

.footerRow {
  margin-top: 30px;
}

.next {
  background: #3aa65a;
  color: #fff;
  padding: 12px 18px;
}
</style>
</head>

<body>
<div class="wrap">

<h1>Kifejezésmód</h1>
<div class="intro">
Itt azt vizsgáljuk, hogyan van a vers megírva:
megmutat vagy magyaráz, mennyire sűrített, pontos és egyedi a megszólalása.
</div>

<div class="topbar">
  <button class="back" onclick="history.back()">← Vissza</button>
  <button class="reload" onclick="location.reload()">Újraelemzés</button>
</div>

<!-- ELŐZŐ EREDMÉNYEK -->
<div class="box" id="previousBox" style="display:none;">
  <h2>Előző lépések</h2>
  <div class="grid">
    <div class="item">
      <strong>Vers típusa</strong>
      <div id="prevMainType"></div>
    </div>
    <div class="item">
      <strong>Hangulat</strong>
      <div id="prevMood"></div>
    </div>
    <div class="item">
      <strong>Szerkezet</strong>
      <div id="prevStructure"></div>
    </div>
    <div class="item">
      <strong>Ritmus</strong>
      <div id="prevRhythm"></div>
    </div>
    <div class="item">
      <strong>Képiség</strong>
      <div id="prevImages"></div>
    </div>
    <div class="item">
      <strong>Egyediség</strong>
      <div id="prevOriginality"></div>
    </div>
  </div>
</div>

<!-- VERS -->
<div class="box" id="poemBox" style="display:none;">
  <h2>A vizsgált vers</h2>
  <div class="poemText" id="poemText"></div>
</div>

<!-- EREDMÉNY -->
<div class="box result" id="resultBox" style="display:none;">
  <h2>Eredmény</h2>
  <div id="resultText"></div>
</div>

<div class="footerRow">
  <button class="next" onclick="goNext()">Tovább az összegzéshez →</button>
</div>

</div>

<script>
const $ = id => document.getElementById(id);

function safeParse(key){
  try { return JSON.parse(sessionStorage.getItem(key)); }
  catch { return null; }
}

function loadData(){
  const poem = sessionStorage.getItem("poem") || "";

  const kind = safeParse("analysis_kind");
  const structure = safeParse("analysis_structure");
  const rhythm = safeParse("analysis_rhythm");
  const images = safeParse("analysis_images");

  // VERS
  if (poem){
    $("poemText").textContent = poem;
    $("poemBox").style.display = "block";
  }

  // ELŐZŐK
  if (kind || structure || rhythm || images){
    $("previousBox").style.display = "block";

    if (kind){
      $("prevMainType").textContent = kind.main_type || "-";
      $("prevMood").textContent = kind.mood || "-";
    }

    if (structure){
      $("prevStructure").textContent = structure.structure_type || "-";
    }

    if (rhythm){
      $("prevRhythm").textContent = rhythm.rhythm_type || "-";
    }

    if (images){
      $("prevImages").textContent = images.imagery_presence || "-";
      $("prevOriginality").textContent = images.originality || "-";
    }
  }

  runAnalysis(poem, kind, structure, rhythm, images);
}

async function runAnalysis(poem, kind, structure, rhythm, images){

  try {
    const res = await fetch("https://YOUR-WORKER-URL", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        poem,
        step: "expression",
        previous: {
          kind,
          structure,
          rhythm,
          images
        }
      })
    });

    const data = await res.json();

    $("resultBox").style.display = "block";
    $("resultText").textContent = data.result || "Nincs válasz.";

    sessionStorage.setItem("analysis_expression", JSON.stringify(data.result));

  } catch (err){
    $("resultText").textContent = "Hiba történt.";
  }
}

function goNext(){
  window.location.href = "osszefoglalo.html";
}

loadData();
</script>

</body>
</html>
