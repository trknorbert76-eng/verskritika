<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verskritika</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #111;
  color: #eee;
}

.wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 30px 20px 60px;
}

h1 {
  font-size: 2.2rem;
  margin-bottom: 10px;
}

.intro {
  color: #bbb;
  margin-bottom: 25px;
}

textarea {
  width: 100%;
  min-height: 260px;
  padding: 16px;
  background: #1b1b1b;
  color: #eee;
  border: 1px solid #444;
  border-radius: 12px;
  font-family: Georgia, serif;
  font-size: 1rem;
  line-height: 1.5;
  resize: vertical;
  box-sizing: border-box;
}

button {
  margin-top: 14px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #d6b36a;
  color: #111;
  font-weight: bold;
  cursor: pointer;
  font-size: 1rem;
}

button:disabled {
  opacity: 0.65;
  cursor: default;
}

.loading {
  margin-top: 20px;
  color: #aaa;
  font-style: italic;
  display: none;
  min-height: 24px;
}

.errorBox {
  display: none;
  margin-top: 20px;
  padding: 14px 16px;
  border-radius: 12px;
  background: #2a1616;
  border: 1px solid #6a2c2c;
  color: #f0c7c7;
  white-space: pre-wrap;
}

.result {
  margin-top: 40px;
  display: none;
  gap: 18px;
}

.card {
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 14px;
  padding: 18px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

.card h2 {
  color: #d6b36a;
  margin-top: 0;
  margin-bottom: 12px;
}

.card p {
  margin: 0;
  white-space: pre-wrap;
  line-height: 1.6;
}

.final {
  border: 1px solid #6f5a2f;
  background: #181511;
}

/* ÉRTELMEZÉS kiemelés */
#cardInterpret {
  border: 1px solid #3a3a3a;
  background: #151515;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Verskritika</h1>
  <p class="intro">
    Először megérti. Aztán kimondja.
  </p>

  <textarea id="poemInput" placeholder="Illeszd be ide a versed..."></textarea>
  <button id="analyzeBtn">Elemzés</button>

  <div class="loading" id="loadingText">Elemzés folyamatban...</div>
  <div class="errorBox" id="errorBox"></div>

  <div class="result" id="resultBox">

    <div class="card" id="cardInterpret">
      <h2>Értelmezés</h2>
      <p id="interpretText"></p>
    </div>

    <div class="card" id="cardQuick">
      <h2>Gyors kép</h2>
      <p id="quickText"></p>
    </div>

    <div class="card" id="cardAnalyzer">
      <h2>Elemző</h2>
      <p id="analyzerText"></p>
    </div>

    <div class="card" id="cardCritic">
      <h2>Kritikus</h2>
      <p id="criticText"></p>
    </div>

    <div class="card" id="cardReader">
      <h2>Olvasó</h2>
      <p id="readerText"></p>
    </div>

    <div class="card final" id="cardFinal">
      <h2>Végső</h2>
      <p id="finalText"></p>
    </div>

  </div>
</div>

<script>
const WORKER_URL = "https://verskritika.trknorbert76.workers.dev";

const btn = document.getElementById("analyzeBtn");
const loading = document.getElementById("loadingText");
const resultBox = document.getElementById("resultBox");
const errorBox = document.getElementById("errorBox");

function resetCards() {
  document.getElementById("interpretText").textContent = "";
  document.getElementById("quickText").textContent = "";
  document.getElementById("analyzerText").textContent = "";
  document.getElementById("criticText").textContent = "";
  document.getElementById("readerText").textContent = "";
  document.getElementById("finalText").textContent = "";

  document.querySelectorAll(".card").forEach(c => c.classList.remove("show"));
}

function getSection(text, name, nextNames) {
  const next = nextNames.join("|");
  const regex = new RegExp(`${name}:([\\s\\S]*?)(?=\\n(?:${next}):|$)`, "i");
  const match = text.match(regex);
  return match ? match[1].trim() : "";
}

function showCard(id, textId, text, delay) {
  setTimeout(() => {
    document.getElementById(textId).textContent =
      text || "Nincs értékelhető tartalom.";
    document.getElementById(id).classList.add("show");
  }, delay);
}

btn.addEventListener("click", async () => {
  const poem = document.getElementById("poemInput").value.trim();
  if (!poem) {
    errorBox.textContent = "Írj be verset.";
    errorBox.style.display = "block";
    return;
  }

  btn.disabled = true;
  errorBox.style.display = "none";
  resetCards();
  loading.style.display = "block";
  resultBox.style.display = "none";

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ poem })
    });

    const data = await res.json();
    const text = data.result;

    const interpret = getSection(text, "ÉRTELMEZÉS", ["GYORS","ELEMZŐ","KRITIKUS","OLVASÓ","VÉGSŐ"]);
    const quick = getSection(text, "GYORS", ["ELEMZŐ","KRITIKUS","OLVASÓ","VÉGSŐ"]);
    const analyzer = getSection(text, "ELEMZŐ", ["KRITIKUS","OLVASÓ","VÉGSŐ"]);
    const critic = getSection(text, "KRITIKUS", ["OLVASÓ","VÉGSŐ"]);
    const reader = getSection(text, "OLVASÓ", ["VÉGSŐ"]);
    const final = getSection(text, "VÉGSŐ", []);

    loading.style.display = "none";
    resultBox.style.display = "grid";

    showCard("cardInterpret","interpretText",interpret,50);
    showCard("cardQuick","quickText",quick,200);
    showCard("cardAnalyzer","analyzerText",analyzer,400);
    showCard("cardCritic","criticText",critic,600);
    showCard("cardReader","readerText",reader,800);
    showCard("cardFinal","finalText",final,1000);

  } catch (err) {
    loading.style.display = "none";
    errorBox.textContent = err.message;
    errorBox.style.display = "block";
  }

  btn.disabled = false;
});
</script>

</body>
</html>
