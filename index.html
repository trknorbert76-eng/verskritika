<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Versminőség-elemző</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #111;
  color: #eee;
}

.wrap {
  max-width: 980px;
  margin: 0 auto;
  padding: 30px 20px 60px;
}

h1 {
  font-size: 2.2rem;
  margin-bottom: 10px;
}

.intro {
  color: #bbb;
  margin-bottom: 25px;
  line-height: 1.6;
}

textarea {
  width: 100%;
  min-height: 260px;
  padding: 16px;
  background: #1b1b1b;
  color: #eee;
  border: 1px solid #444;
  border-radius: 12px;
  font-family: Georgia, serif;
  font-size: 1rem;
  line-height: 1.5;
  resize: vertical;
  box-sizing: border-box;
}

.btnRow {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #d6b36a;
  color: #111;
  font-weight: bold;
  cursor: pointer;
  font-size: 1rem;
}

button:disabled {
  opacity: 0.8;
  cursor: default;
}

button.secondary {
  background: #2b2b2b;
  color: #eee;
  border: 1px solid #444;
}

button.seed {
  background: #d6b36a;
  color: #111;
  border: 1px solid #d6b36a;
}

button.done {
  background: #2e7d32;
  color: #fff;
  border: 1px solid #4caf50;
}  

  button.pulse {
  animation: pulseAnim 1.1s infinite;
}

@keyframes pulseAnim {
  0% { opacity: 1; }
  50% { opacity: 0.55; }
  100% { opacity: 1; }
}

.statusBox {
  display: none;
  margin-top: 20px;
  padding: 14px 16px;
  border-radius: 12px;
  white-space: pre-wrap;
  line-height: 1.5;
}

.errorBox {
  background: #2a1616;
  border: 1px solid #6a2c2c;
  color: #f0c7c7;
}

.okBox {
  background: #162417;
  border: 1px solid #2f6a35;
  color: #cdeccf;
}

.stepsWrap {
  display: none;
  margin-top: 28px;
}

.stepsTitle {
  font-size: 1.15rem;
  color: #d6b36a;
  margin-bottom: 14px;
}

.stepRow {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 12px;
  align-items: center;
  margin-bottom: 12px;
}

.stepBtn {
  text-align: left;
  background: #7b1e1e;
  color: #f5dddd;
  border: 1px solid #9a3c3c;
}

.stepBtn.loading {
  background: #a35d00;
  color: #fff3df;
  border: 1px solid #d38a1f;
}

.stepBtn.done {
  background: #2e7d32;
  color: #fff;
  border: 1px solid #4caf50;
}

.progressBox {
  height: 14px;
  background: #2a1616;
  border: 1px solid #5d2b2b;
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}

.progressFill {
  height: 100%;
  width: 0%;
  background: #7b1e1e;
  transition: width 0.35s ease;
}

.progressBox.loading {
  background: #3a2605;
  border-color: #a35d00;
}

.progressBox.loading .progressFill {
  width: 100%;
  background: linear-gradient(90deg, #ff9800 0%, #ffb74d 50%, #ff9800 100%);
  background-size: 200% 100%;
  animation: moveBar 1s linear infinite;
}

.progressBox.done {
  background: #19301b;
  border-color: #2e7d32;
}

.progressBox.done .progressFill {
  width: 100%;
  background: #4caf50;
  animation: none;
}

.stepNote {
  margin-top: 4px;
  font-size: 0.92rem;
  color: #bbb;
}

.runnerInfo {
  margin-top: 18px;
  padding: 14px 16px;
  background: #151515;
  border: 1px solid #333;
  border-radius: 12px;
  color: #ddd;
  line-height: 1.6;
  display: none;
  white-space: pre-wrap;
}

@keyframes moveBar {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

@media (max-width: 760px) {
  .stepRow {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Versminőség-elemző</h1>
  <p class="intro">
    <p class="intro">
  Lásd, hol áll a versed a nagy költők mércéjén.
</p>


  <textarea id="poemInput" placeholder="Illeszd be ide a versed..."></textarea>

<div class="btnRow">
  <button id="analyzeBtn">Elemzés</button>
  <button id="checkStatusBtn" class="secondary">Ellenőr: nincs</button>
  <button id="depthStatusBtn" class="secondary">Hatás + mélység: nincs</button>
  <button id="summaryStatusBtn" class="secondary">Összegzés: nincs</button>
</div>

  <div class="statusBox errorBox" id="errorBox"></div>
  <div class="statusBox okBox" id="okBox"></div>

  <div class="stepsWrap" id="stepsWrap">
    <div class="stepsTitle">Elemző oldalak állapota</div>

    <div class="stepRow">
      <button class="stepBtn" id="btn-kind" disabled>Felismerés várakozik</button>
      <div>
        <div class="progressBox" id="box-kind"><div class="progressFill"></div></div>
        <div class="stepNote" id="note-kind">Még nem indult el.</div>
      </div>
    </div>

    <div class="stepRow">
      <button class="stepBtn" id="btn-structure" disabled>Szerkezet várakozik</button>
      <div>
        <div class="progressBox" id="box-structure"><div class="progressFill"></div></div>
        <div class="stepNote" id="note-structure">Még nem indult el.</div>
      </div>
    </div>

    <div class="stepRow">
      <button class="stepBtn" id="btn-rhythm" disabled>Ritmus várakozik</button>
      <div>
        <div class="progressBox" id="box-rhythm"><div class="progressFill"></div></div>
        <div class="stepNote" id="note-rhythm">Még nem indult el.</div>
      </div>
    </div>

    <div class="stepRow">
      <button class="stepBtn" id="btn-imagery" disabled>Kép várakozik</button>
      <div>
        <div class="progressBox" id="box-imagery"><div class="progressFill"></div></div>
        <div class="stepNote" id="note-imagery">Még nem indult el.</div>
      </div>
    </div>

    <div class="stepRow">
      <button class="stepBtn" id="btn-expression" disabled>Kifejezés várakozik</button>
      <div>
        <div class="progressBox" id="box-expression"><div class="progressFill"></div></div>
        <div class="stepNote" id="note-expression">Még nem indult el.</div>
      </div>
    </div>

    <div class="stepRow">
  <button class="stepBtn" id="btn-check" disabled>Ellenőr várakozik</button>
  <div>
    <div class="progressBox" id="box-check"><div class="progressFill"></div></div>
    <div class="stepNote" id="note-check">Még nem indult el.</div>
  </div>
</div>

    <div class="stepRow">
      <button class="stepBtn" id="btn-summary" disabled>Összegzés várakozik</button>
      <div>
        <div class="progressBox" id="box-summary"><div class="progressFill"></div></div>
        <div class="stepNote" id="note-summary">Még nem indult el.</div>
      </div>
    </div>

    <div class="runnerInfo" id="runnerInfo"></div>
  </div>

  <iframe id="runnerFrame" style="display:none;"></iframe>
</div>

<script>
const WORKER_URL = "https://verskritika.trknorbert76.workers.dev";
const DEPTH_WORKER_URL = "https://melyseg-depth.trknorbert76.workers.dev";

const analyzeBtn = document.getElementById("analyzeBtn");
const checkStatusBtn = document.getElementById("checkStatusBtn");
const depthStatusBtn = document.getElementById("depthStatusBtn");
const summaryStatusBtn = document.getElementById("summaryStatusBtn");
const poemInput = document.getElementById("poemInput");
const errorBox = document.getElementById("errorBox");
const okBox = document.getElementById("okBox");
const stepsWrap = document.getElementById("stepsWrap");
const runnerInfo = document.getElementById("runnerInfo");
const runnerFrame = document.getElementById("runnerFrame");

const pipeline = [
  {
    key: "kind",
    doneKey: "step_kind_done",
    page: "felismeres.html?autorun=1",
    targetPage: "felismeres.html",
    buttonId: "btn-kind",
    boxId: "box-kind",
    noteId: "note-kind",
    waitingText: "Felismerés várakozik",
    loadingText: "Felismerés folyamatban",
    doneText: "Felismerés kész"
  },
  {
    key: "structure",
    doneKey: "step_structure_done",
    page: "szerkezet.html?autorun=1",
    targetPage: "szerkezet.html",
    buttonId: "btn-structure",
    boxId: "box-structure",
    noteId: "note-structure",
    waitingText: "Szerkezet várakozik",
    loadingText: "Szerkezet folyamatban",
    doneText: "Szerkezet kész"
  },
  {
    key: "rhythm",
    doneKey: "step_rhythm_done",
    page: "ritmus.html?autorun=1",
    targetPage: "ritmus.html",
    buttonId: "btn-rhythm",
    boxId: "box-rhythm",
    noteId: "note-rhythm",
    waitingText: "Ritmus várakozik",
    loadingText: "Ritmus folyamatban",
    doneText: "Ritmus kész"
  },
  {
    key: "imagery",
    doneKey: "step_imagery_done",
    page: "kepek.html?autorun=1",
    targetPage: "kepek.html",
    buttonId: "btn-imagery",
    boxId: "box-imagery",
    noteId: "note-imagery",
    waitingText: "Kép várakozik",
    loadingText: "Kép folyamatban",
    doneText: "Kép kész"
  },
  {
    key: "expression",
    doneKey: "step_expression_done",
    page: "kifejezesmod.html?autorun=1",
    targetPage: "kifejezesmod.html",
    buttonId: "btn-expression",
    boxId: "box-expression",
    noteId: "note-expression",
    waitingText: "Kifejezés várakozik",
    loadingText: "Kifejezés folyamatban",
    doneText: "Kifejezés kész"
  },
  {
    key: "check",
    doneKey: "step_check_done",
    page: "ellenor.html?autorun=1",
    targetPage: "ellenor.html",
    buttonId: "btn-check",
    boxId: "box-check",
    noteId: "note-check",
    waitingText: "Ellenőr várakozik",
    loadingText: "Ellenőr folyamatban",
    doneText: "Ellenőr kész"
  },
  {
    key: "summary",
    doneKey: "step_summary_done",
    page: "osszegzes.html?autorun=1",
    targetPage: "osszegzes.html",
    buttonId: "btn-summary",
    boxId: "box-summary",
    noteId: "note-summary",
    waitingText: "Összegzés várakozik",
    loadingText: "Összegzés folyamatban",
    doneText: "Összegzés kész"
  }
];

function showError(message) {
  okBox.style.display = "none";
  okBox.textContent = "";
  errorBox.textContent = message;
  errorBox.style.display = "block";
}

function showOk(message) {
  errorBox.style.display = "none";
  errorBox.textContent = "";
  okBox.textContent = message;
  okBox.style.display = "block";
}

function clearMessages() {
  errorBox.style.display = "none";
  errorBox.textContent = "";
  okBox.style.display = "none";
  okBox.textContent = "";
}

function setLoading(isLoading) {
  analyzeBtn.disabled = isLoading;
  analyzeBtn.textContent = isLoading ? "Ellenőrzés..." : "Elemzés";
}

function appendRunnerInfo(message) {
  runnerInfo.style.display = "block";
  runnerInfo.textContent += (runnerInfo.textContent ? "\n" : "") + message;
}

function resetRunnerInfo() {
  runnerInfo.style.display = "none";
  runnerInfo.textContent = "";
}

function resetStepUi(step) {
  const btn = document.getElementById(step.buttonId);
  const box = document.getElementById(step.boxId);
  const note = document.getElementById(step.noteId);

  btn.disabled = true;
  btn.textContent = step.waitingText;
  btn.classList.remove("loading", "done");

  box.classList.remove("loading", "done");
  note.textContent = "Még nem indult el.";

  btn.onclick = null;
}

function setStepLoading(step) {
  const btn = document.getElementById(step.buttonId);
  const box = document.getElementById(step.boxId);
  const note = document.getElementById(step.noteId);

  btn.disabled = true;
  btn.textContent = step.loadingText;
  btn.classList.remove("done");
  btn.classList.add("loading");

  box.classList.remove("done");
  box.classList.add("loading");

  note.textContent = "Az oldal háttérben dolgozik...";
}

function setStepDone(step) {
  const btn = document.getElementById(step.buttonId);
  const box = document.getElementById(step.boxId);
  const note = document.getElementById(step.noteId);

  btn.disabled = false;
  btn.textContent = step.doneText;
  btn.classList.remove("loading");
  btn.classList.add("done");

  box.classList.remove("loading");
  box.classList.add("done");

  note.textContent = "Az eredmény elkészült, az oldal megnyitható.";

  btn.onclick = () => {
    window.location.href = step.targetPage;
  };
}

function clearStepStorage() {
  sessionStorage.removeItem("analysis_kind");
  sessionStorage.removeItem("analysis_structure");
  sessionStorage.removeItem("analysis_rhythm");
  sessionStorage.removeItem("analysis_rhyme");
  sessionStorage.removeItem("analysis_images");
  sessionStorage.removeItem("analysis_expression");
  sessionStorage.removeItem("analysis_check_seed");
  sessionStorage.removeItem("analysis_check");
  sessionStorage.removeItem("analysis_impact");
  sessionStorage.removeItem("analysis_depth");
  sessionStorage.removeItem("analysis_summary");

  sessionStorage.removeItem("step_kind_done");
  sessionStorage.removeItem("step_structure_done");
  sessionStorage.removeItem("step_rhythm_done");
  sessionStorage.removeItem("step_imagery_done");
  sessionStorage.removeItem("step_expression_done");
  sessionStorage.removeItem("step_check_done");
  sessionStorage.removeItem("step_impact_done");
  sessionStorage.removeItem("step_impact_loading");
  sessionStorage.removeItem("step_depth_done");
  sessionStorage.removeItem("step_depth_loading");
  sessionStorage.removeItem("step_summary_done");
}

function resetAllStepUi() {
  pipeline.forEach(resetStepUi);
}

function updateCheckStatus() {
  const hasSeed = sessionStorage.getItem("analysis_check_seed");
  const hasFinal = sessionStorage.getItem("analysis_check");

  checkStatusBtn.classList.remove("secondary", "seed", "done");

  if (hasFinal) {
    checkStatusBtn.classList.add("done");
    checkStatusBtn.textContent = "Ellenőr: kész";
  } else if (hasSeed) {
    checkStatusBtn.classList.add("seed");
    checkStatusBtn.textContent = "Ellenőr: saját vélemény kész";
  } else {
    checkStatusBtn.classList.add("secondary");
    checkStatusBtn.textContent = "Ellenőr: nincs";
  }
}

function updateDepthStatus() {
  const hasImpact = sessionStorage.getItem("analysis_impact");
  const impactDone = sessionStorage.getItem("step_impact_done");
  const impactLoading = sessionStorage.getItem("step_impact_loading");

  const hasDepth = sessionStorage.getItem("analysis_depth");
  const depthDone = sessionStorage.getItem("step_depth_done");
  const depthLoading = sessionStorage.getItem("step_depth_loading");

  depthStatusBtn.classList.remove("secondary", "seed", "done");

if (hasImpact && impactDone && hasDepth && depthDone) {
  depthStatusBtn.classList.remove("pulse");
  depthStatusBtn.classList.add("done");
  depthStatusBtn.textContent = "Hatás + mélység: kész";
  return;
}
  
if (impactLoading && depthLoading) {
  depthStatusBtn.classList.add("seed", "pulse");
  depthStatusBtn.textContent = "Hatás + mélység: dolgozik...";
  return;
}

  if (hasImpact && impactDone && depthLoading) {
    depthStatusBtn.classList.add("seed");
    depthStatusBtn.textContent = "Hatás kész, mélység folyamatban";
    return;
  }

  if (hasImpact && impactDone) {
    depthStatusBtn.classList.add("seed");
    depthStatusBtn.textContent = "Hatás: kész";
    return;
  }

  if (hasDepth && depthDone) {
    depthStatusBtn.classList.add("done");
    depthStatusBtn.textContent = "Mélység: kész";
    return;
  }

  depthStatusBtn.classList.add("secondary");
  depthStatusBtn.textContent = "Elemzés: nincs";
  depthStatusBtn.classList.remove("pulse");
}

  function updateSummaryStatus() {
  const hasSummary = sessionStorage.getItem("step_summary_done");

  summaryStatusBtn.classList.remove("secondary", "seed", "done");

  if (hasSummary) {
    summaryStatusBtn.classList.add("done");
    summaryStatusBtn.textContent = "Összegzés: kész";
  } else {
    summaryStatusBtn.classList.add("secondary");
    summaryStatusBtn.textContent = "Összegzés: nincs";
  }
}

function waitForStep(doneKey, timeoutMs = 180000) {
  return new Promise((resolve, reject) => {
    const startedAt = Date.now();

    const timer = setInterval(() => {
      const done = sessionStorage.getItem(doneKey);

      const checkReady =
        doneKey === "step_check_done" &&
        sessionStorage.getItem("analysis_check");

      if (done || checkReady) {
        if (doneKey === "step_check_done" && !done) {
          sessionStorage.setItem("step_check_done", Date.now().toString());
        }

        clearInterval(timer);
        resolve(true);
        return;
      }

      if (Date.now() - startedAt > timeoutMs) {
        clearInterval(timer);
        reject(new Error("Időtúllépés: " + doneKey));
      }
    }, 400);
  });
}

async function startCheckSeed(poem) {
  try {
    const response = await fetch(WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        poem,
        step: "check_seed"
      })
    });

    const data = await response.json();

    if (response.ok && data.ok) {
      sessionStorage.setItem("analysis_check_seed", JSON.stringify(data.result));
      updateCheckStatus();
      appendRunnerInfo("Ellenőr első olvasata elkészült.");
    }
  } catch (err) {
    appendRunnerInfo("Az ellenőr első olvasata most nem készült el.");
  }
}

async function startDepthAndImpactAnalysis(poem) {
  try {
    sessionStorage.setItem("step_impact_loading", "1");
    sessionStorage.setItem("step_depth_loading", "1");
    updateDepthStatus();

    const kindPack = JSON.parse(sessionStorage.getItem("analysis_kind") || "null");
    const kind = kindPack?.result || kindPack || {};

    const response = await fetch(DEPTH_WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        poem,
        previous: {
          kind: {
            main_type: kind.main_type || "",
            style_label: kind.style_label || "",
            speech_mode: kind.speech_mode || "",
            style_traits: kind.style_traits || []
          }
        }
      })
    });

    const data = await response.json();

    if (response.ok && data.ok) {

      // 🔹 HATÁS külön mentve
      sessionStorage.setItem("analysis_impact", JSON.stringify({
        impact_score: data.result.impact_score,
        impact_level: data.result.impact_level,
        highlighted_lines: data.result.highlighted_lines,
        impact_reasoning: data.result.impact_reasoning
      }));

      // 🔹 MÉLYSÉG külön mentve
      sessionStorage.setItem("analysis_depth", JSON.stringify(data.result));

      sessionStorage.setItem("step_impact_done", Date.now().toString());
      sessionStorage.setItem("step_depth_done", Date.now().toString());

      appendRunnerInfo("Hatás és mélység elemzés elkészült.");
    } else {
      throw new Error(data.error || "A hatás/mélység elemzés hibával leállt.");
    }
  } catch (err) {
    appendRunnerInfo("A hatás/mélység elemzés most nem készült el.");
    throw err;
  } finally {
    sessionStorage.removeItem("step_impact_loading");
    sessionStorage.removeItem("step_depth_loading");
    updateDepthStatus();
  }
}

 checkStatusBtn.addEventListener("click", () => {
window.location.href = "ellenor.html";
});

depthStatusBtn.addEventListener("click", () => {
  window.location.href = "melyseg.html";
});

 summaryStatusBtn.addEventListener("click", () => {
  window.location.href = "osszegzes.html";
}); 

function readJSON(key) {
  try {
    return JSON.parse(sessionStorage.getItem(key) || "null");
  } catch {
    return null;
  }
}

function unwrap(pack) {
  return pack?.result || pack || {};
}

async function runWorkerStep(stepName, storageKey, doneKey, poem, previous = {}) {
  const response = await fetch(WORKER_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      poem,
      step: stepName,
      previous
    })
  });

  const data = await response.json();

  if (!response.ok || !data.ok) {
    throw new Error(data.error || `${stepName} elemzés hibával leállt.`);
  }

  sessionStorage.setItem(storageKey, JSON.stringify(data.result));
  sessionStorage.setItem(doneKey, Date.now().toString());

  return data.result;
}

async function runStepWithUi(step, task) {
  setStepLoading(step);

  try {
    const result = await task();
    setStepDone(step);
    appendRunnerInfo(step.doneText + ".");
    return result;
  } catch (err) {
    appendRunnerInfo(step.waitingText.replace(" várakozik", "") + " hibával leállt.");
    throw err;
  }
}

analyzeBtn.addEventListener("click", async () => {
  const poem = poemInput.value.trim();

  clearMessages();
  resetRunnerInfo();
  stepsWrap.style.display = "none";

  if (!poem) {
    showError("Illessz be egy verset.");
    return;
  }

  setLoading(true);

  try {
    clearStepStorage();
    sessionStorage.setItem("poem", poem);
    sessionStorage.setItem("poemText", poem);

    resetAllStepUi();
    updateCheckStatus();
    updateDepthStatus();

    stepsWrap.style.display = "block";
    showOk("A vers elfogadva. A háttérelemzés elindult.");
    appendRunnerInfo("Felismerés indul...");

    // 1. FELISMERÉS — ez marad első, mert erre épül a többi
    setStepLoading(pipeline[0]);

    const kind = await runWorkerStep(
      "kind",
      "analysis_kind",
      "step_kind_done",
      poem
    );

    if (kind?.is_poem === false) {
      showError(kind?.message || "Ez nem tekinthető versnek.");
      return;
    }

    setStepDone(pipeline[0]);
    appendRunnerInfo("Felismerés kész.");

    const basePrevious = {
      kind
    };

    // 2. ELLENŐR SAJÁT ELSŐ OLVASATA — külön indul
    startCheckSeed(poem);

    // 3. HATÁS + MÉLYSÉG — külön worker, párhuzamosan indul
    const depthPromise = startDepthAndImpactAnalysis(poem);

    // 4. RÉSZ-ELEMZŐK — PÁRHUZAMOSAN FUTNAK
    const structureStep = pipeline.find(s => s.key === "structure");
    const rhythmStep = pipeline.find(s => s.key === "rhythm");
    const imageryStep = pipeline.find(s => s.key === "imagery");
    const expressionStep = pipeline.find(s => s.key === "expression");

    const structurePromise = runStepWithUi(structureStep, () =>
      runWorkerStep(
        "structure",
        "analysis_structure",
        "step_structure_done",
        poem,
        basePrevious
      )
    );

    const rhythmPromise = runStepWithUi(rhythmStep, () =>
      runWorkerStep(
        "rhythm",
        "analysis_rhythm",
        "step_rhythm_done",
        poem,
        basePrevious
      )
    );

    const imageryPromise = runStepWithUi(imageryStep, () =>
      runWorkerStep(
        "images",
        "analysis_images",
        "step_imagery_done",
        poem,
        basePrevious
      )
    );

    const expressionPromise = runStepWithUi(expressionStep, () =>
      runWorkerStep(
        "expression",
        "analysis_expression",
        "step_expression_done",
        poem,
        basePrevious
      )
    );

    appendRunnerInfo("Szerkezet, ritmus, képek, kifejezésmód és hatás/mélység párhuzamosan fut...");

    const [
      structure,
      rhythm,
      images,
      expression,
      depth
    ] = await Promise.all([
      structurePromise,
      rhythmPromise,
      imageryPromise,
      expressionPromise,
      depthPromise
    ]);

    updateDepthStatus();

    // 5. ELLENŐR — CSAK MOST INDUL, HA MINDEN KÉSZ
    const checkStep = pipeline.find(s => s.key === "check");

    appendRunnerInfo("Minden szükséges rész elkészült. Ellenőr indul...");

    const check = await runStepWithUi(checkStep, () =>
      runWorkerStep(
        "check",
        "analysis_check",
        "step_check_done",
        poem,
        {
          kind,
          structure,
          rhythm,
          images,
          expression,
          depth: unwrap(readJSON("analysis_depth")),
          impact: unwrap(readJSON("analysis_impact")),
          check_seed: unwrap(readJSON("analysis_check_seed"))
        }
      )
    );

    updateCheckStatus();

    // 6. ÖSSZEGZÉS — ezt meghagyhatjuk iframe-ben, mert az oldalad valószínűleg sessionStorage-ból dolgozik
    const summaryStep = pipeline.find(s => s.key === "summary");

    appendRunnerInfo("Összegzés indul...");
    setStepLoading(summaryStep);

runnerFrame.src = summaryStep.page + "&t=" + Date.now();
await waitForStep("step_summary_done");

  setStepDone(summaryStep);
appendRunnerInfo("Összegzés kész.");
updateSummaryStatus();

    showOk("Minden elemzés elkészült. Beléphetsz bármelyik oldalra.");
  } catch (err) {
    showError(err.message || "Nem sikerült kapcsolódni az elemzőhöz.");
  } finally {
    setLoading(false);
    updateCheckStatus();
    updateDepthStatus();
    updateSummaryStatus();
  }
});
 
if (!poemInput.value.trim()) {
  clearStepStorage();
}

updateCheckStatus();
updateDepthStatus();
updateSummaryStatus();
</script>
</body>
