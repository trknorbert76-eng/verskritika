<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verskritika</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #111;
  color: #eee;
}

.wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 30px 20px 60px;
}

h1 {
  font-size: 2.2rem;
  margin-bottom: 10px;
}

.intro {
  color: #bbb;
  margin-bottom: 25px;
  line-height: 1.6;
}

textarea {
  width: 100%;
  min-height: 260px;
  padding: 16px;
  background: #1b1b1b;
  color: #eee;
  border: 1px solid #444;
  border-radius: 12px;
  font-family: Georgia, serif;
  font-size: 1rem;
  line-height: 1.5;
  resize: vertical;
  box-sizing: border-box;
}

.btnRow {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #d6b36a;
  color: #111;
  font-weight: bold;
  cursor: pointer;
  font-size: 1rem;
}

button:disabled {
  opacity: 0.65;
  cursor: default;
}

#nextBtn {
  display: none;
  background: #4caf50;
  color: #fff;
}

.statusBox {
  display: none;
  margin-top: 20px;
  padding: 14px 16px;
  border-radius: 12px;
  white-space: pre-wrap;
  line-height: 1.5;
}

.errorBox {
  background: #2a1616;
  border: 1px solid #6a2c2c;
  color: #f0c7c7;
}

.okBox {
  background: #162417;
  border: 1px solid #2f6a35;
  color: #cdeccf;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Verskritika</h1>
  <p class="intro">
    Először megérti. Aztán kimondja.
  </p>

  <textarea id="poemInput" placeholder="Illeszd be ide a versed..."></textarea>

  <div class="btnRow">
    <button id="analyzeBtn">Elemzés</button>
    <button id="nextBtn">Tovább →</button>
  </div>

  <div class="statusBox errorBox" id="errorBox"></div>
  <div class="statusBox okBox" id="okBox"></div>
</div>

<script>
const WORKER_URL = "https://verskritika.trknorbert76.workers.dev";
const analyzeBtn = document.getElementById("analyzeBtn");
const nextBtn = document.getElementById("nextBtn");
const poemInput = document.getElementById("poemInput");
const errorBox = document.getElementById("errorBox");
const okBox = document.getElementById("okBox");

function showError(message) {
  okBox.style.display = "none";
  okBox.textContent = "";
  errorBox.textContent = message;
  errorBox.style.display = "block";
}

function showOk(message) {
  errorBox.style.display = "none";
  errorBox.textContent = "";
  okBox.textContent = message;
  okBox.style.display = "block";
}

function clearMessages() {
  errorBox.style.display = "none";
  errorBox.textContent = "";
  okBox.style.display = "none";
  okBox.textContent = "";
}

function setLoading(isLoading) {
  analyzeBtn.disabled = isLoading;
  analyzeBtn.textContent = isLoading ? "Ellenőrzés..." : "Elemzés";
}

analyzeBtn.addEventListener("click", async () => {
  const poem = poemInput.value.trim();

  clearMessages();
  nextBtn.style.display = "none";

  if (!poem) {
    showError("Illessz be egy verset.");
    return;
  }

  setLoading(true);

  try {
    const response = await fetch(WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        poem,
        step: "kind"
      })
    });

    const data = await response.json();

    if (!response.ok || !data.ok) {
      showError(data.error || "Hiba történt az ellenőrzés közben.");
      return;
    }

    if (data.is_poem === false) {
      showError(data.result?.message || "Ez nem tekinthető versnek.");
      return;
    }

    sessionStorage.setItem("poem", poem);

    sessionStorage.setItem("analysis_kind", JSON.stringify(data.result));

    sessionStorage.removeItem("analysis_structure");
    sessionStorage.removeItem("analysis_rhythm");
    sessionStorage.removeItem("analysis_rhyme");
    sessionStorage.removeItem("analysis_imagery");
    sessionStorage.removeItem("analysis_summary");

    showOk("A vers elmentve. Tovább mehetsz az első belső elemző oldalra.");
    nextBtn.style.display = "inline-block";

  } catch (err) {
    showError("Nem sikerült kapcsolódni az elemzőhöz.");
  } finally {
    setLoading(false);
  }
});

nextBtn.addEventListener("click", () => {
  window.location.href = "felismeres.html";
});
</script>

</body>
</html>
